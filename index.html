<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#e8edf8; --muted:#5a6a8a; --muted2:#8a9ab8;
  --blue:#3b82f6; --amber:#f59e0b; --green:#10b981; --pink:#ec4899;
  --radius:10px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* TOPBAR */
.topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:200; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--blue),#6366f1); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.brand-name { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:3px; background:linear-gradient(90deg,#e8edf8,#7aa8ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-tabs { display:flex; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:3px; }
.nav-tab { padding:6px 16px; border-radius:6px; border:none; background:none; color:var(--muted2); font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600; cursor:pointer; transition:background .15s,color .15s; }
.nav-tab.active { background:var(--blue); color:#fff; }

/* ALUNO BAR */
.aluno-bar { background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.aluno-bar label { font-size:0.72rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
.aluno-bar select { background:var(--surface); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; padding:6px 12px; outline:none; cursor:pointer; }

/* BOTÕES */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 15px; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; transition:filter .15s,transform .1s; white-space:nowrap; }
.btn:hover { filter:brightness(1.15); transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn-blue { background:var(--blue); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-ghost { background:rgba(255,255,255,0.06); border:1px solid var(--border2); color:var(--muted2); }
.btn-ghost:hover { color:var(--text); }
.btn-danger { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
.btn-sm { padding:5px 11px; font-size:0.75rem; }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* CADASTRO */
.cadastro-wrap { padding:24px; max-width:1100px; margin:0 auto; }
.dias-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
.dia-tab { padding:8px 18px; border-radius:8px; border:1px solid var(--border2); background:var(--surface); color:var(--muted2); font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all .15s; }
.dia-tab.active { color:#fff; }
.dia-tab:hover:not(.active) { border-color:var(--blue); color:var(--text); }
.cadastro-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; }
.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.panel-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; }
.ex-list { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
.ex-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; display:flex; align-items:center; gap:12px; }
.ex-color-bar { width:4px; height:36px; border-radius:999px; flex-shrink:0; }
.ex-info { flex:1; }
.ex-name { font-size:0.9rem; font-weight:600; margin-bottom:3px; }
.ex-meta { font-size:0.75rem; color:var(--muted2); }
.ex-meta b { color:var(--amber); }
.ex-del { background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; padding:4px 6px; border-radius:5px; transition:color .15s,background .15s; line-height:1; }
.ex-del:hover { color:#f87171; background:rgba(239,68,68,0.12); }
.add-ex-form { background:var(--surface2); border:1px dashed var(--border2); border-radius:var(--radius); padding:16px; display:grid; grid-template-columns:2fr 1fr 1fr auto; gap:10px; align-items:end; }
.add-ex-form input { background:var(--surface); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; padding:8px 12px; outline:none; transition:border-color .15s; width:100%; }
.add-ex-form input:focus { border-color:var(--blue); }
.add-ex-form input::placeholder { color:var(--muted); }
.form-field { display:flex; flex-direction:column; gap:4px; }
.form-label { font-size:0.68rem; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); }
.empty-state { text-align:center; padding:32px; color:var(--muted); font-size:0.85rem; }
.empty-state .emoji { font-size:2rem; margin-bottom:8px; }

/* BOARD */
.board-header { padding:16px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
.board-header label { font-size:0.72rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
.board-header select { background:var(--surface2); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; padding:6px 12px; outline:none; cursor:pointer; }
.board-wrap { display:flex; gap:18px; padding:24px; overflow-x:auto; min-height:calc(100vh - 170px); align-items:flex-start; }
.board-col { flex:0 0 290px; background:var(--surface); border:1px solid var(--border); border-radius:14px; display:flex; flex-direction:column; transition:border-color .2s,box-shadow .2s; min-height:200px; }
.board-col.drag-over { border-color:rgba(255,255,255,0.25); box-shadow:0 0 0 2px rgba(59,130,246,0.2); }
.col-head { padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; }
.col-head-left { display:flex; align-items:center; gap:8px; }
.col-dot { width:9px; height:9px; border-radius:50%; }
.col-title-text { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; }
.col-badge { background:rgba(255,255,255,0.08); border-radius:999px; padding:1px 9px; font-size:0.7rem; font-weight:700; color:var(--muted2); }
.col-accent { height:3px; margin:0 16px 12px; border-radius:999px; opacity:0.6; }
.cards-drop { flex:1; padding:0 10px 10px; display:flex; flex-direction:column; gap:8px; min-height:80px; }
.board-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:12px 13px; cursor:grab; user-select:none; transition:transform .15s,box-shadow .15s,background .15s; }
.board-card:hover { background:#1f2d45; transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.35); }
.board-card.is-dragging { opacity:0.4; transform:scale(0.96); cursor:grabbing; }
.bcard-accent { width:100%; height:2px; border-radius:999px; margin-bottom:9px; opacity:0.7; }
.bcard-name { font-size:0.88rem; font-weight:600; margin-bottom:4px; }
.bcard-meta { font-size:0.72rem; color:var(--muted2); }
.bcard-meta b { color:var(--amber); }
.col-clear { margin:0 10px 12px; background:none; border:none; color:var(--muted); font-size:0.72rem; font-weight:600; cursor:pointer; padding:4px; transition:color .15s; text-align:left; }
.col-clear:hover { color:#f87171; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:500; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:16px; padding:28px; width:360px; box-shadow:0 24px 64px rgba(0,0,0,0.55); animation:popIn .18s ease; }
@keyframes popIn { from{opacity:0;transform:scale(0.94) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-box h3 { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; margin-bottom:20px; }
.modal-field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.modal-field label { font-size:0.7rem; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--muted); }
.modal-field input { background:var(--surface2); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; padding:9px 12px; outline:none; transition:border-color .15s; }
.modal-field input:focus { border-color:var(--blue); }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }

/* LINK DO ALUNO */
.link-box { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:10px 14px; font-size:0.78rem; color:var(--muted2); word-break:break-all; margin-top:10px; }
.link-box b { color:var(--green); }

/* LOADING */
.loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:0.9rem; gap:10px; }
.spinner { width:20px; height:20px; border:2px solid var(--border2); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* VIEW ALUNO (modo somente leitura do board) */
.aluno-view-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.aluno-name-tag { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; color:var(--blue); }

@media(max-width:600px) {
  .add-ex-form { grid-template-columns:1fr 1fr; }
  .add-ex-form .btn { grid-column:span 2; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <div class="brand">
    <div class="brand-icon">💪</div>
    <div class="brand-name">FitBoard</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setView('cadastro')">📋 Cadastro</button>
    <button class="nav-tab" onclick="setView('board')">🏋️ Board</button>
  </div>
</div>

<!-- ALUNO BAR (só para personal) -->
<div class="aluno-bar" id="aluno-bar">
  <label>Aluno:</label>
  <select id="sel-aluno" onchange="trocarAluno()"></select>
  <button class="btn btn-ghost btn-sm" onclick="abrirModalAluno()">+ Novo aluno</button>
  <button class="btn btn-danger btn-sm" onclick="removerAluno()">🗑 Remover</button>
  <div style="flex:1"></div>
  <button class="btn btn-green btn-sm" onclick="gerarLink()">🔗 Gerar link do aluno</button>
  <span id="lbl-saved" style="font-size:0.75rem;color:var(--green);display:none">✓ Salvo</span>
</div>

<!-- VIEW: CADASTRO -->
<div class="view active" id="view-cadastro">
  <div class="cadastro-wrap">
    <div class="dias-tabs" id="dias-tabs"></div>
    <div class="cadastro-panel">
      <div class="panel-header">
        <div class="panel-title" id="panel-title">SEGUNDA</div>
        <span id="panel-count" style="font-size:0.75rem;color:var(--muted)">0 exercícios</span>
      </div>
      <div class="ex-list" id="ex-list"></div>
      <div class="add-ex-form">
        <div class="form-field">
          <span class="form-label">Exercício</span>
          <input type="text" id="f-nome" placeholder="ex: Supino Reto" />
        </div>
        <div class="form-field">
          <span class="form-label">Séries × Reps</span>
          <input type="text" id="f-series" placeholder="4×10" />
        </div>
        <div class="form-field">
          <span class="form-label">Carga</span>
          <input type="text" id="f-carga" placeholder="40kg" />
        </div>
        <button class="btn btn-green" onclick="addExercicio()">＋ Adicionar</button>
      </div>
    </div>
  </div>
</div>

<!-- VIEW: BOARD (personal) -->
<div class="view" id="view-board">
  <div class="board-header">
    <label>Dia:</label>
    <select id="sel-dia-board" onchange="renderBoard()"></select>
    <button class="btn btn-blue btn-sm" onclick="resetBoard()">↺ Reiniciar</button>
    <div style="flex:1"></div>
    <span style="font-size:0.75rem;color:var(--muted)">Arraste entre as colunas</span>
  </div>
  <div class="board-wrap" id="board-wrap"></div>
</div>

<!-- VIEW: ALUNO (acesso via link) -->
<div class="view" id="view-aluno">
  <div class="aluno-view-header">
    <div>
      <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Olá,</div>
      <div class="aluno-name-tag" id="aluno-view-nome"></div>
    </div>
    <div style="flex:1"></div>
    <div>
      <label style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">Dia do treino:</label>
      <select id="sel-dia-aluno" onchange="renderBoardAluno()" style="background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:6px 12px;outline:none;cursor:pointer;"></select>
    </div>
    <button class="btn btn-blue btn-sm" onclick="resetBoardAluno()">↺ Reiniciar dia</button>
  </div>
  <div class="board-wrap" id="board-wrap-aluno"></div>
</div>

<!-- MODAL: NOVO ALUNO -->
<div class="modal-overlay" id="modal-aluno" onclick="if(event.target===this)fecharModal('modal-aluno')">
  <div class="modal-box">
    <h3>Novo Aluno</h3>
    <div class="modal-field">
      <label>Nome do aluno</label>
      <input type="text" id="m-aluno-nome" placeholder="ex: João Silva" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal('modal-aluno')">Cancelar</button>
      <button class="btn btn-blue" onclick="confirmarNovoAluno()">Criar</button>
    </div>
  </div>
</div>

<!-- MODAL: LINK DO ALUNO -->
<div class="modal-overlay" id="modal-link" onclick="if(event.target===this)fecharModal('modal-link')">
  <div class="modal-box">
    <h3>Link do Aluno</h3>
    <p style="font-size:0.82rem;color:var(--muted2);margin-bottom:6px">Compartilhe este link com o aluno. Apenas ele verá o treino dele.</p>
    <div class="link-box" id="link-box"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal('modal-link')">Fechar</button>
      <button class="btn btn-blue" onclick="copiarLink()">📋 Copiar link</button>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD745N3_QKO_OO8Zz9EeS5zzOENHQmF5hM",
  authDomain: "fitboard-7a305.firebaseapp.com",
  projectId: "fitboard-7a305",
  storageBucket: "fitboard-7a305.firebasestorage.app",
  messagingSenderId: "234161785570",
  appId: "1:234161785570:web:390149b12603172737acbb"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ═══════════════════════════════════
// ESTADO
// ═══════════════════════════════════
const DIAS  = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const CORES = ['#3b82f6','#f59e0b','#10b981','#ec4899','#8b5cf6','#f97316'];
const COLUNAS = [
  {id:'todo',  label:'A Fazer',   cor:'#3b82f6'},
  {id:'doing', label:'Fazendo',   cor:'#f59e0b'},
  {id:'done',  label:'Concluído', cor:'#10b981'},
];

let alunos    = [];   // [{id, nome, treinos:[[]x6]}]
let idAtivo   = null;
let diaAtivo  = 0;
let boardState = {};  // cardId -> colId
let boardDia  = 0;

// Para view do aluno
let alunoViewData = null;
let boardStateAluno = {};
let boardDiaAluno = 0;

// ═══════════════════════════════════
// DETECTAR MODO (personal ou aluno)
// ═══════════════════════════════════
const params = new URLSearchParams(window.location.search);
const modoAluno = params.get('aluno');

if (modoAluno) {
  // Modo aluno — esconde painel personal
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('aluno-bar').style.display = 'none';
  carregarModoAluno(modoAluno);
} else {
  carregarPersonal();
}

// ═══════════════════════════════════
// MODO PERSONAL
// ═══════════════════════════════════
async function carregarPersonal() {
  mostrarLoading('view-cadastro');
  try {
    const snap = await getDocs(collection(db, 'alunos'));
    alunos = [];
    snap.forEach(d => alunos.push({id: d.id, ...d.data()}));
    if (alunos.length === 0) {
      // Cria aluno padrão
      const id = 'aluno_' + Date.now();
      const novo = { nome: 'Aluno Exemplo', treinos: [[],[],[],[],[],[]] };
      await setDoc(doc(db, 'alunos', id), novo);
      alunos.push({id, ...novo});
    }
    idAtivo = alunos[0].id;
    renderSelectAluno();
    renderCadastro();
  } catch(e) {
    document.getElementById('view-cadastro').innerHTML = `<div class="loading">❌ Erro ao conectar com Firebase. Verifique as regras do Firestore.</div>`;
    console.error(e);
  }
}

function mostrarLoading(viewId) {
  document.getElementById(viewId).innerHTML = `<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  document.getElementById(viewId).className = 'view active';
}

// ═══════ ALUNOS ═══════
function alunoAtivo() { return alunos.find(a => a.id === idAtivo); }

function renderSelectAluno() {
  const sel = document.getElementById('sel-aluno');
  sel.innerHTML = alunos.map(a =>
    `<option value="${a.id}" ${a.id===idAtivo?'selected':''}>${esc(a.nome)}</option>`
  ).join('');
}

window.trocarAluno = function() {
  idAtivo = document.getElementById('sel-aluno').value;
  diaAtivo = 0;
  renderCadastro();
}

window.abrirModalAluno = function() {
  document.getElementById('m-aluno-nome').value = '';
  document.getElementById('modal-aluno').classList.add('open');
  setTimeout(()=>document.getElementById('m-aluno-nome').focus(),60);
}

window.confirmarNovoAluno = async function() {
  const nome = document.getElementById('m-aluno-nome').value.trim();
  if (!nome) return document.getElementById('m-aluno-nome').focus();
  const id = 'aluno_' + Date.now();
  const novo = { nome, treinos: [[],[],[],[],[],[]] };
  await setDoc(doc(db, 'alunos', id), novo);
  alunos.push({id, ...novo});
  idAtivo = id;
  fecharModal('modal-aluno');
  renderSelectAluno();
  renderCadastro();
}

window.removerAluno = async function() {
  if (alunos.length === 1) return alert('É necessário ter ao menos 1 aluno.');
  const a = alunoAtivo();
  if (!confirm(`Remover "${a.nome}" e todos os treinos?`)) return;
  await deleteDoc(doc(db, 'alunos', a.id));
  alunos = alunos.filter(x => x.id !== a.id);
  idAtivo = alunos[0].id;
  renderSelectAluno();
  renderCadastro();
}

// ═══════ LINK ═══════
window.gerarLink = function() {
  const base = window.location.href.split('?')[0];
  const link = `${base}?aluno=${idAtivo}`;
  document.getElementById('link-box').innerHTML = `<b>${link}</b>`;
  document.getElementById('modal-link').classList.add('open');
}

window.copiarLink = function() {
  const base = window.location.href.split('?')[0];
  const link = `${base}?aluno=${idAtivo}`;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.querySelector('#modal-link .btn-blue');
    btn.textContent = '✓ Copiado!';
    setTimeout(()=> btn.textContent = '📋 Copiar link', 2000);
  });
}

// ═══════ CADASTRO ═══════
function renderCadastro() {
  // Recria a view de cadastro caso tenha sido substituída pelo loading
  const wrap = document.getElementById('view-cadastro');
  if (!wrap.querySelector('.cadastro-wrap')) {
    wrap.innerHTML = `
      <div class="cadastro-wrap">
        <div class="dias-tabs" id="dias-tabs"></div>
        <div class="cadastro-panel">
          <div class="panel-header">
            <div class="panel-title" id="panel-title"></div>
            <span id="panel-count" style="font-size:0.75rem;color:var(--muted)"></span>
          </div>
          <div class="ex-list" id="ex-list"></div>
          <div class="add-ex-form">
            <div class="form-field"><span class="form-label">Exercício</span><input type="text" id="f-nome" placeholder="ex: Supino Reto" /></div>
            <div class="form-field"><span class="form-label">Séries × Reps</span><input type="text" id="f-series" placeholder="4×10" /></div>
            <div class="form-field"><span class="form-label">Carga</span><input type="text" id="f-carga" placeholder="40kg" /></div>
            <button class="btn btn-green" onclick="addExercicio()">＋ Adicionar</button>
          </div>
        </div>
      </div>`;
    ['f-nome','f-series','f-carga'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') addExercicio(); });
    });
  }

  renderDiasTabs();
  const aluno = alunoAtivo();
  const treino = aluno.treinos[diaAtivo] || [];
  const cor = CORES[diaAtivo];
  document.getElementById('panel-title').textContent = DIAS[diaAtivo].toUpperCase();
  document.getElementById('panel-count').textContent = treino.length + ' exercício' + (treino.length!==1?'s':'');

  const list = document.getElementById('ex-list');
  list.innerHTML = treino.length === 0
    ? `<div class="empty-state"><div class="emoji">🏋️</div>Nenhum exercício para ${DIAS[diaAtivo]}.<br>Adicione abaixo!</div>`
    : treino.map((ex,i) => `
        <div class="ex-item">
          <div class="ex-color-bar" style="background:${cor}"></div>
          <div class="ex-info">
            <div class="ex-name">${esc(ex.nome)}</div>
            <div class="ex-meta">${esc(ex.series)} · <b>${esc(ex.carga)}</b></div>
          </div>
          <button class="ex-del" onclick="delExercicio(${i})">✕</button>
        </div>`).join('');

  document.getElementById('f-nome').value = '';
  document.getElementById('f-series').value = '';
  document.getElementById('f-carga').value = '';
}

function renderDiasTabs() {
  document.getElementById('dias-tabs').innerHTML = DIAS.map((d,i) => `
    <button class="dia-tab ${i===diaAtivo?'active':''}"
            onclick="setDia(${i})"
            style="${i===diaAtivo?'background:'+CORES[i]+';border-color:'+CORES[i]:''}">${d}</button>`).join('');
}

window.setDia = function(i) { diaAtivo = i; renderCadastro(); }

window.addExercicio = async function() {
  const nome   = document.getElementById('f-nome').value.trim();
  if (!nome) return document.getElementById('f-nome').focus();
  const series = document.getElementById('f-series').value.trim();
  const carga  = document.getElementById('f-carga').value.trim();
  const aluno  = alunoAtivo();
  aluno.treinos[diaAtivo].push({nome, series, carga});
  await salvarAluno(aluno);
  renderCadastro();
  document.getElementById('f-nome').focus();
}

window.delExercicio = async function(i) {
  const aluno = alunoAtivo();
  aluno.treinos[diaAtivo].splice(i,1);
  await salvarAluno(aluno);
  renderCadastro();
}

async function salvarAluno(aluno) {
  await setDoc(doc(db, 'alunos', aluno.id), {nome: aluno.nome, treinos: aluno.treinos});
  const lbl = document.getElementById('lbl-saved');
  if (lbl) { lbl.style.display='inline'; clearTimeout(lbl._t); lbl._t = setTimeout(()=>lbl.style.display='none',2000); }
}

// ═══════ BOARD (personal) ═══════
window.setView = function(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el => {
    if (el.textContent.toLowerCase().includes(v==='cadastro'?'cadastro':'board')) el.classList.add('active');
  });
  if (v==='board') {
    renderSelDiaBoard();
    renderBoard();
  }
}

function renderSelDiaBoard() {
  const sel = document.getElementById('sel-dia-board');
  sel.innerHTML = DIAS.map((d,i)=>`<option value="${i}" ${i==boardDia?'selected':''}>${d}</option>`).join('');
}

window.renderBoard = function() {
  boardDia = parseInt(document.getElementById('sel-dia-board').value);
  renderBoardEm('board-wrap', alunoAtivo().treinos, boardDia, boardState, false);
}

window.resetBoard = function() {
  boardState = {};
  renderBoard();
}

// ═══════ BOARD (aluno) ═══════
async function carregarModoAluno(alunoId) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const v = document.getElementById('view-aluno');
  v.classList.add('active');
  v.innerHTML = `<div class="loading"><div class="spinner"></div>Carregando seu treino...</div>`;

  try {
    const snap = await getDoc(doc(db, 'alunos', alunoId));
    if (!snap.exists()) {
      v.innerHTML = `<div class="loading">❌ Aluno não encontrado. Verifique o link.</div>`;
      return;
    }
    alunoViewData = {id: snap.id, ...snap.data()};
    v.innerHTML = `
      <div class="aluno-view-header">
        <div>
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Olá,</div>
          <div class="aluno-name-tag">${esc(alunoViewData.nome)}</div>
        </div>
        <div style="flex:1"></div>
        <div>
          <label style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">Dia:</label>
          <select id="sel-dia-aluno" onchange="renderBoardAluno()" style="background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:6px 12px;outline:none;cursor:pointer;">
            ${DIAS.map((d,i)=>`<option value="${i}">${d}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-blue btn-sm" onclick="resetBoardAluno()">↺ Reiniciar</button>
      </div>
      <div class="board-wrap" id="board-wrap-aluno"></div>`;
    renderBoardAluno();
  } catch(e) {
    v.innerHTML = `<div class="loading">❌ Erro ao carregar. Tente novamente.</div>`;
    console.error(e);
  }
}

window.renderBoardAluno = function() {
  boardDiaAluno = parseInt(document.getElementById('sel-dia-aluno').value);
  renderBoardEm('board-wrap-aluno', alunoViewData.treinos, boardDiaAluno, boardStateAluno, true);
}

window.resetBoardAluno = function() {
  boardStateAluno = {};
  renderBoardAluno();
}

// ═══════ BOARD GENÉRICO ═══════
function renderBoardEm(wrapId, treinos, dia, state, isAluno) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const treino = treinos[dia] || [];
  const cor = CORES[dia];
  const prefix = isAluno ? 'a_' : 'p_';

  if (treino.length === 0) {
    wrap.innerHTML = `<div style="padding:40px;color:var(--muted);font-size:0.9rem;text-align:center;flex:1">
      Nenhum exercício cadastrado para ${DIAS[dia]}.
    </div>`;
    return;
  }

  const cardIds = treino.map((_,i) => `${prefix}${dia}_${i}`);

  wrap.innerHTML = COLUNAS.map(col => {
    const cards = cardIds.filter(cid => (state[cid]||'todo') === col.id);
    return `
      <div class="board-col" id="${wrapId}_col_${col.id}"
           ondragover="onDragOverG(event,'${wrapId}','${col.id}')"
           ondragleave="onDragLeaveG(event,'${wrapId}','${col.id}')"
           ondrop="onDropG(event,'${wrapId}','${col.id}',${isAluno})">
        <div class="col-head">
          <div class="col-head-left">
            <div class="col-dot" style="background:${col.cor}"></div>
            <span class="col-title-text">${col.label}</span>
          </div>
          <span class="col-badge">${cards.length}</span>
        </div>
        <div class="col-accent" style="background:${col.cor}"></div>
        <div class="cards-drop" id="${wrapId}_drop_${col.id}">
          ${cards.map(cid => {
            const idx = parseInt(cid.split('_')[isAluno?2:2]);
            const ex = treino[idx];
            if (!ex) return '';
            return `<div class="board-card" draggable="true" id="bc_${cid}"
                         ondragstart="onDragStartG(event,'${cid}',${isAluno})">
                      <div class="bcard-accent" style="background:${cor}"></div>
                      <div class="bcard-name">${esc(ex.nome)}</div>
                      <div class="bcard-meta">${esc(ex.series)} · <b>${esc(ex.carga)}</b></div>
                    </div>`;
          }).join('')}
        </div>
        ${col.id==='done'?`<button class="col-clear" onclick="limparConcluidosG('${wrapId}',${isAluno})">Limpar concluídos</button>`:''}
      </div>`;
  }).join('');
}

// ═══════ DRAG ═══════
let draggingId = null;
let draggingIsAluno = false;

window.onDragStartG = function(e, cardId, isAluno) {
  draggingId = cardId;
  draggingIsAluno = isAluno;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const el=document.getElementById('bc_'+cardId); if(el) el.classList.add('is-dragging'); },0);
}
window.onDragOverG = function(e, wrapId, colId) {
  e.preventDefault();
  document.getElementById(wrapId+'_col_'+colId)?.classList.add('drag-over');
}
window.onDragLeaveG = function(e, wrapId, colId) {
  const col = document.getElementById(wrapId+'_col_'+colId);
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}
window.onDropG = function(e, wrapId, colId, isAluno) {
  e.preventDefault();
  document.querySelectorAll('.board-col').forEach(c=>c.classList.remove('drag-over'));
  if (!draggingId) return;
  const state = draggingIsAluno ? boardStateAluno : boardState;
  state[draggingId] = colId;
  draggingId = null;
  if (draggingIsAluno) renderBoardAluno();
  else renderBoard();
}
window.limparConcluidosG = function(wrapId, isAluno) {
  const state = isAluno ? boardStateAluno : boardState;
  Object.keys(state).forEach(k=>{ if(state[k]==='done') delete state[k]; });
  if (isAluno) renderBoardAluno(); else renderBoard();
}

// ═══════ UTILS ═══════
window.fecharModal = function(id) { document.getElementById(id).classList.remove('open'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e=>{
  if (e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
});

document.getElementById('m-aluno-nome')?.addEventListener('keydown', e=>{
  if (e.key==='Enter') confirmarNovoAluno();
});

['f-nome','f-series','f-carga'].forEach(id=>{
  document.getElementById(id)?.addEventListener('keydown', e=>{ if(e.key==='Enter') addExercicio(); });
});

</script>
